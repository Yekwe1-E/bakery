<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | NDU Pastry</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">NDU Pastry</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li id="authLinks"><a href="login.html">Login</a></li>
            </ul>
            <div class="mobile-menu" onclick="toggleMenu()">☰</div>
        </div>
    </nav>

    <div class="checkout-grid">
        <div class="checkout-form">
            <h2>Delivery Information</h2>
            <div id="alertContainer"></div>
            
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="customerName">Full Name</label>
                    <input type="text" id="customerName" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+234 XXX XXX XXXX">
                </div>
                
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" rows="4" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    Place Order
                </button>
                <a href="cart.html" style="display: block; text-align: center; margin-top: 1rem; color: var(--gray);">
                    ← Back to Cart
                </a>
            </form>
        </div>

        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="orderItems">
                <!-- Items loaded via JavaScript -->
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="orderTotal">₦0.00</span>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Check if user is logged in
        const token = localStorage.getItem('token');
        if (!token) {
            showAlert('Please login to complete checkout', 'error');
            setTimeout(() => window.location.href = 'login.html', 2000);
        }

        // Load order summary
        function loadOrderSummary() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('orderItems');
            
            if (cart.length === 0) {
                window.location.href = 'shop.html';
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="summary-row">
                        <span>${item.name} x${item.quantity}</span>
                        <span>₦${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('orderTotal').textContent = `₦${total.toLocaleString()}`;
        }

        // Handle checkout
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Initializing Order...';

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const orderData = {
                items: cart.map(item => ({
                    product_id: item.id,
                    quantity: item.quantity
                })),
                customer_name: document.getElementById('customerName').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value
            };

            try {
                // 1. Create order in backend
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (response.ok) {
                    // 2. Trigger Paystack payment
                    payWithPaystack(data);
                } else {
                    throw new Error(data.message || 'Failed to place order');
                }
            } catch (error) {
                showAlert(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Place Order';
            }
        });

        function payWithPaystack(orderInfo) {
            // Demo Mode Check: If key is still the placeholder, simulate payment
            if (!orderInfo.publicKey || orderInfo.publicKey.includes('xxxxxxxx')) {
                showAlert('Demo Mode: Simulating secure payment process...', 'info');
                
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.innerHTML = '<span class="loading"></span> Processing Demo Payment...';

                setTimeout(() => {
                    // Generate a mock reference for the backend to recognize
                    const mockRef = `MOCK_REF_${orderInfo.orderId}_${Date.now()}`;
                    verifyPayment(mockRef);
                }, 2000);
                return;
            }

            const handler = PaystackPop.setup({
                key: orderInfo.publicKey,
                email: orderInfo.email,
                amount: orderInfo.amountKobo,
                currency: 'NGN',
                ref: 'ORD-' + orderInfo.orderId + '-' + Math.floor((Math.random() * 1000000000) + 1),
                metadata: {
                    order_id: orderInfo.orderId,
                    custom_fields: [
                        {
                            display_name: "Customer Name",
                            variable_name: "customer_name",
                            value: document.getElementById('customerName').value
                        }
                    ]
                },
                callback: function(response) {
                    // 3. Verify payment with backend
                    verifyPayment(response.reference);
                },
                onClose: function() {
                    const submitBtn = document.getElementById('submitBtn');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Place Order';
                    showAlert('Payment cancelled', 'error');
                }
            });
            handler.openIframe();
        }

        async function verifyPayment(reference) {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<span class="loading"></span> Verifying Payment...';

            try {
                const response = await fetch(`/api/orders/verify/${reference}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Order placed and payment verified! Thank you for your purchase.', 'success');
                    localStorage.removeItem('cart');
                    setTimeout(() => window.location.href = 'index.html', 3000);
                } else {
                    throw new Error(data.message || 'Payment verification failed');
                }
            } catch (error) {
                showAlert(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Retry Payment Verification';
            }
        }

        loadOrderSummary();
        updateAuthLinks();
    </script>
</body>
</html>
