<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Sweet Crumbs Bakery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Sweet Crumbs</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li id="authLinks"><a href="login.html">Login</a></li>
            </ul>
            <div class="mobile-menu" onclick="toggleMenu()">☰</div>
        </div>
    </nav>

    <div class="checkout-grid">
        <div class="checkout-form">
            <h2>Delivery Information</h2>
            <div id="alertContainer"></div>
            
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="customerName">Full Name</label>
                    <input type="text" id="customerName" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+234 XXX XXX XXXX">
                </div>
                
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" rows="4" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    Place Order
                </button>
                <a href="cart.html" style="display: block; text-align: center; margin-top: 1rem; color: var(--gray);">
                    ← Back to Cart
                </a>
            </form>
        </div>

        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="orderItems">
                <!-- Items loaded via JavaScript -->
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="orderTotal">₦0.00</span>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Check if user is logged in
        const token = localStorage.getItem('token');
        if (!token) {
            showAlert('Please login to complete checkout', 'error');
            setTimeout(() => window.location.href = 'login.html', 2000);
        }

        // Load order summary
        function loadOrderSummary() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('orderItems');
            
            if (cart.length === 0) {
                window.location.href = 'shop.html';
                return;
            }

            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="summary-row">
                        <span>${item.name} x${item.quantity}</span>
                        <span>₦${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('orderTotal').textContent = `₦${total.toLocaleString()}`;
        }

        // Handle checkout
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Processing...';

            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const orderData = {
                items: cart.map(item => ({
                    product_id: item.id,
                    quantity: item.quantity
                })),
                customer_name: document.getElementById('customerName').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value
            };

            try {
                const response = await fetch('http://localhost:3000/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Order placed successfully! Thank you for your purchase.', 'success');
                    localStorage.removeItem('cart');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    throw new Error(data.message || 'Failed to place order');
                }
            } catch (error) {
                showAlert(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Place Order';
            }
        });

        loadOrderSummary();
        updateAuthLinks();
    </script>
</body>
</html>
